alias: Dog goes outside
trigger:
  - platform: state
    entity_id: binary_sensor.dog_flap
    to: "on"
    for: "00:00:01"
condition:
  - condition: state
    entity_id: input_boolean.dog_outside
    state: "off"
  - condition: template
    value_template: >
      {{ (now() - states.input_boolean.dog_outside.last_changed).total_seconds() > 5 }}
action:
  - service: input_boolean.turn_on
    target:
      entity_id: input_boolean.dog_outside
  - service: input_datetime.set_datetime
    target:
      entity_id: input_datetime.dog_went_out_time
    data:
      timestamp: "{{ now().timestamp() }}"
  - service: logbook.log
    data:
      name: "Dog Flap"
      message: "Dog went outside"
      entity_id: binary_sensor.dog_flap